<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Interactive Map with Raster + Search + Chart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<!-- Sidebar CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-sidebar-v2/css/leaflet-sidebar.min.css">
<!-- Search CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-search@2.9.9/dist/leaflet-search.min.css">

<style>
  /* CSS */
  body { margin:0; padding:0; }
  #map { height: 100vh; }
  .legend {
    background: white;
    padding: 10px;
    line-height: 1.5;
    position: absolute;
    bottom: 30px;
    left: 10px;
    z-index: 1000;
    border: 1px solid #555;
  }
  .button {
    background-color: white;
    border: 2px solid #555;
    padding: 5px 10px;
    cursor: pointer;
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
  }
</style>
</head>

<body>

<!-- Info Button -->
<button class="button" onclick="alert('This is a map of Sarawak with elevation raster and district boundaries.')">
  Info
</button>

<!-- Map -->
<div id="map"></div>

<!-- Sidebar -->
<div id="sidebar" class="leaflet-sidebar collapsed">
  <div class="leaflet-sidebar-tabs">
    <ul role="tablist">
      <li><a href="#home" role="tab"><i class="fa fa-info"></i></a></li>
    </ul>
  </div>
  <div class="leaflet-sidebar-content">
    <div class="leaflet-sidebar-pane" id="home">
      <h1 class="leaflet-sidebar-header">District Info<span class="leaflet-sidebar-close"></span></h1>
      <p id="info-content">Click on a district to see info.</p>
      <canvas id="chart" width="300" height="200"></canvas>
    </div>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <b>Elevation</b><br>
  <i style="background:red;width:10px;height:10px;display:inline-block;"></i> High<br>
  <i style="background:orange;width:10px;height:10px;display:inline-block;"></i> Medium<br>
  <i style="background:pink;width:10px;height:10px;display:inline-block;"></i> Low<br>
</div>

<!-- JS Libraries -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-sidebar-v2/js/leaflet-sidebar.min.js"></script>
<script src="https://unpkg.com/leaflet-search@2.9.9/dist/leaflet-search.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// JS starts here

// Initialize map
var map = L.map('map').setView([1.5, 110], 8);

// Basemaps
var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

var googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
  maxZoom: 20,
  subdomains:['mt0','mt1','mt2','mt3'],
  attribution: 'Google Satellite'
});

// Raster Tile (Your exported raster)
var raster = L.tileLayer('./tiles/{z}/{x}/{y}.png', {
  attribution: 'Raster Heatmap',
  maxZoom: 18,
  minZoom: 5
}).addTo(map);

// Sidebar
var sidebar = L.control.sidebar('sidebar').addTo(map);

// Load GeoJSON
fetch('boundary.geojson')
.then(res => res.json())
.then(data => {
  const geojsonLayer = L.geoJSON(data, {
    style: { color: 'black', weight: 1, fillOpacity: 0 },
    onEachFeature: function (feature, layer) {
      layer.on('click', function() {
        sidebar.open('home');

        // Example data
        const pop = feature.properties.POPULATION;
        const area = feature.properties.AREA;
        const other = feature.properties.OTHER;

        document.getElementById('info-content').innerHTML = `
          <b>District:</b> ${feature.properties.NAME_2}<br>
          <b>Population:</b> ${pop}<br>
          <b>Area:</b> ${area} km²<br>
        `;

        const ctx = document.getElementById('chart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['Population', 'Area', 'Other'],
            datasets: [{
              label: 'Data',
              data: [pop, area, other],
              backgroundColor: ['red', 'blue', 'green']
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } }
          }
        });
      });
    }
  }).addTo(map);

  // Search
  const searchControl = new L.Control.Search({
    layer: geojsonLayer,
    propertyName: 'NAME_2',
    marker: false,
    moveToLocation: function(latlng) {
      map.setView(latlng, 10);
    }
  });
  map.addControl(searchControl);
});

// Layer Control
var baseMaps = {
  "OpenStreetMap": osm,
  "Google Satellite": googleSat
};

var overlayMaps = {
  "Raster Heatmap": raster
};

L.control.layers(baseMaps, overlayMaps).addTo(map);

</script>

</body>
</html>
