<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>My Web Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

  // Initialize the map
  var map = L.map('map').setView([1.5, 110.0], 8);

  // Add XYZ Tile Raster
  L.tileLayer('./tiles/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: 'My Raster',
  }).addTo(map);

  // Add Vector Boundary (GeoJSON)
  fetch('boundary.geojson')
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        style: { color: 'black', weight: 1, fillOpacity: 0 },
        onEachFeature: function (feature, layer) {
          layer.bindPopup(feature.properties.NAME_2); // Label popups
        }
      }).addTo(map);
    });

</script>
</body>
</html>
